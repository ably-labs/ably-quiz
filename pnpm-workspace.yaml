# Carbon vs Silicon monorepo (BRIEF §B3 S1.1).
# `agents/` is a single workspace package ONLY so each agents/<slug>/agent.ts can
# import the shared @ably-quiz/agent-runner building blocks. The individual agent
# folders are still a runtime registry (agent.json + crib.md + optional agent.ts),
# loaded by path — they are NOT packages themselves.
packages:
  - 'apps/*'
  - 'packages/*'
  - 'spikes/*'
  - 'agents'
